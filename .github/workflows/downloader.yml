name: Downloader Fixed

on:
  workflow_dispatch:
    inputs:
      activation_code:
        description: 'کد فعالسازی'
        required: false
      url:
        description: 'لینک دانلود'
        required: false

jobs:
  main:
    runs-on: ubuntu-latest
    steps:

      - name: 🔍 Check activation
        run: |
          if [ -f ".activated" ]; then
            echo "ACTIVATED=true" >> $GITHUB_ENV
          else
            echo "ACTIVATED=false" >> $GITHUB_ENV
          fi

      - name: 🔑 Activate if needed
        run: |
          if [ "$ACTIVATED" = "false" ]; then
            if [ -z "${{ github.event.inputs.activation_code }}" ]; then
              echo "❌ هنوز فعال نشده‌ای"
              exit 1
            fi

            if [ "${{ github.event.inputs.activation_code }}" != "1234" ]; then
              echo "❌ کد فعالسازی اشتباه است"
              exit 1
            fi

            echo "✅ Activated"
            echo "1" > .activated
          fi

      - name: ⬇️ Install downloader
        run: sudo apt update && sudo apt install -y aria2

      - name: ⬇️ Download file (debug)
        run: |
          echo "URL => '${{ github.event.inputs.url }}'"
      
          if [ -z "${{ github.event.inputs.url }}" ]; then
            echo "❌ لینک دانلود خالی است"
            exit 1
          fi
      
          mkdir -p files
      
          aria2c \
            --console-log-level=notice \
            --summary-interval=5 \
            "${{ github.event.inputs.url }}" \
            -d files
