name: 🔥 Advanced Downloader - Phase 2

on:
  workflow_dispatch:
    inputs:
      activation_code:
        description: '🔑 کد فعالسازی'
        required: false
      urls:
        description: '🔗 لینک‌ها (با فاصله)'
        required: true
      zip_mode:
        description: '📦 حالت خروجی'
        required: false
        default: normal
        type: choice
        options:
          - normal
          - zip
      zip_password:
        description: '🔒 رمز زیپ'
        required: false

env:
  VALID_CODE: "1234"

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt update && sudo apt install -y aria2 zip

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: 🔑 Activation
        run: ./scripts/activate.sh
        env:
          ACTIVATION_CODE: ${{ github.event.inputs.activation_code }}

      - name: ⬇️ Download
        run: ./scripts/download.sh
        env:
          URLS: ${{ github.event.inputs.urls }}

      - name: 🗜️ ZIP
        run: ./scripts/zip.sh
        env:
          ZIP_MODE: ${{ github.event.inputs.zip_mode }}
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}

      - name: 📤 Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: |
            downloads
            output.zip
