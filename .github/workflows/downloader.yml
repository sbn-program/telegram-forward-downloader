permissions:
  contents: write

name: 🔥 Auto Downloader (Commercial)

on:
  workflow_dispatch:
    inputs:
      activation_code:
        description: '🔑 Activation code (once)'
        required: false
      urls:
        description: '🔗 Download link'
        required: true
      zip_mode:
        description: '📦 Zip output'
        required: false
        default: zip
        type: choice
        options:
          - zip
          - normal
      zip_password:
        description: '🔒 Zip password'
        required: false

env:
  VALID_CODE: "1234"

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: sudo apt update && sudo apt install -y aria2 zip

      - run: chmod +x scripts/*.sh

      - uses: actions/cache@v4
        with:
          path: .activated
          key: activation-cache-v1

      - name: 🔑 Activate
        run: ./scripts/activate.sh
        env:
          ACTIVATION_CODE: ${{ github.event.inputs.activation_code }}

      - uses: actions/cache@v4
        with:
          path: .activated
          key: activation-cache-v1

      - name: ⬇️ Download
        run: ./scripts/download.sh
        env:
          URLS: ${{ github.event.inputs.urls }}

      - name: 🗜️ ZIP
        run: ./scripts/zip.sh
        env:
          ZIP_MODE: ${{ github.event.inputs.zip_mode }}
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}

      - name: ✂️ Auto Split (50MB)
        if: github.event.inputs.zip_mode == 'zip'
        run: ./scripts/split.sh

      - name: 🚀 Auto Push
        run: ./scripts/push.sh

      - name: 📝 README
        run: ./scripts/readme.sh

      - name: 📤 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: |
            output
            downloads
