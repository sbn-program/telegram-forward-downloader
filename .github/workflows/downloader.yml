name: Downloader Step 3

on:
  workflow_dispatch:
    inputs:
      activation_code:
        description: 'کد فعالسازی'
        required: false
      url:
        description: 'لینک دانلود'
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      activated: ${{ steps.out.outputs.activated }}
    steps:
      - id: out
        run: |
          if [ -f ".activated" ]; then
            echo "activated=true" >> $GITHUB_OUTPUT
          else
            echo "activated=false" >> $GITHUB_OUTPUT
          fi

  activate:
    needs: check
    if: needs.check.outputs.activated == 'false' && github.event.inputs.activation_code != ''
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ github.event.inputs.activation_code }}" = "1234" ]; then
            echo "✅ Activated"
            echo "1" > .activated
          else
            echo "❌ Wrong code"
            exit 1
          fi

  download:
    needs: [check, activate]
    if: needs.check.outputs.activated == 'true' || success()
    runs-on: ubuntu-latest
    steps:
      - name: ✅ اجازه دانلود داری
        run: echo "✅ اجازه دانلود داری"

      # ✅✅✅ مرحله ۷ از همین‌جا شروع می‌شود ✅✅✅

      - name: Install downloader
        run: sudo apt update && sudo apt install -y aria2

      - name: Download file
        run: |
          if [ -z "${{ github.event.inputs.url }}" ]; then
            echo "❌ لینک دانلود ندادی"
            exit 1
          fi

          mkdir files
          aria2c "${{ github.event.inputs.url }}" -d files
