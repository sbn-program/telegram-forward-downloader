name: Download Telegram Post

on:
  workflow_dispatch:
    inputs:
      post_url:
        description: "Telegram post URL"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip ffmpeg
          pip install telegram-dl

      - name: Download & split
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          POST_URL: ${{ github.event.inputs.post_url }}
        run: |
          bash scripts/download_and_split.sh

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Add telegram file (split)"
          git push
