name: Telegram Downloader

on:
  workflow_dispatch:  # اجرا به‌صورت دستی از تب "Actions"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          mkdir -p downloads
          python bot.py &

          # دادن زمان برای اجرای ربات (۲ ساعت)
          sleep 7200

      - name: Commit and push downloaded files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/* || echo "No new files"
          git commit -m "Add downloaded Telegram files" || echo "Nothing to commit"
          git push
